services:
  - type: web
    name: chatbot-pro-rag
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: OPENAI_API_KEY
        sync: false
    disk:
      name: chatbot-data
      mountPath: /opt/render/project/data
      sizeGB: 5